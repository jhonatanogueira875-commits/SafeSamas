<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Entrar | SafeSamas</title>

    <link rel="icon" href="assets/logo-safe.png" type="image/png">

    <link rel="stylesheet" href="css/safe.css">
    <link rel="stylesheet" href="css/safe-login.css">

</head>

<body>

    <header class="safe-header">

        <a href="index.html" class="container-header">

            <img
                src="assets/logo-safe.png"
                class="safe-logo"
                alt="Logo SafeSamas">

            <span>SafeSamas</span>

        </a>

    </header>

    <main class="container">

        <img
            src="assets/logo-safe.png"
            id="logo"
            alt="Logo SafeSamas">

        <h1>Entrar</h1>

        <p class="subtitulo">
            Bem-vindo de volta.
        </p>

        <form id="loginForm">

            <label for="email">
                E-mail
            </label>

            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
                required>

            <label for="senha">
                Senha
            </label>

            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required>

            <button type="submit">
                Entrar
            </button>

        </form>

        <br>

        <p>

            Ainda não possui uma conta?

            <br><br>

            <a href="cadastro.html">

                Criar Conta

            </a>

        </p>

        <br>

        <a href="index.html">

            ← Voltar para a página inicial

        </a>

    </main>

    <!-- ==================================================
         Biblioteca Oficial do Supabase
    =================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ==================================================
         Conexão com o Supabase
    =================================================== -->

    <script src="js/supabase.js"></script>

    <!-- ==================================================
         Autenticação
    =================================================== -->

    <script src="js/safe-auth.js"></script>

</body>

</html>
