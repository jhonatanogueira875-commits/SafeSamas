<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Criar Conta | SafeSamas</title>

    <link rel="icon"
          href="assets/logo-safe.png"
          type="image/png">

    <link rel="stylesheet"
          href="css/safe.css">

    <link rel="stylesheet"
          href="css/safe-login.css">

</head>

<body>

<header class="safe-header">

    <a href="index.html"
       class="container-header">

        <img src="assets/logo-safe.png"
             class="safe-logo"
             alt="SafeSamas">

        <span>SafeSamas</span>

    </a>

</header>

<main class="container">

    <img src="assets/logo-safe.png"
         id="logo"
         alt="Logo SafeSamas">

    <h1>Criar Conta</h1>

    <p class="subtitulo">

        Crie sua conta para proteger tudo o que é importante para você.

    </p>

    <form id="formCadastroUsuario">

        <label for="nome">

            Nome Completo

        </label>

        <input
            type="text"
            id="nome"
            autocomplete="name"
            placeholder="Digite seu nome"
            required>

        <label for="email">

            E-mail

        </label>

        <input
            type="email"
            id="email"
            autocomplete="email"
            placeholder="Digite seu e-mail"
            required>

        <label for="senha">

            Senha

        </label>

        <input
            type="password"
            id="senha"
            autocomplete="new-password"
            placeholder="Crie uma senha"
            required>

        <label for="confirmarSenha">

            Confirmar Senha

        </label>

        <input
            type="password"
            id="confirmarSenha"
            autocomplete="new-password"
            placeholder="Repita sua senha"
            required>

        <button type="submit">

            Criar Conta

        </button>

    </form>

    <br>

    <p>

        Já possui uma conta?

    </p>

    <br>

    <a href="login.html">

        Entrar

    </a>

    <br><br>

    <a href="index.html">

        ← Voltar para a Página Inicial

    </a>

</main>

<!-- Biblioteca Oficial -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Conexão -->

<script src="js/supabase.js"></script>

<!-- Cadastro -->

<script src="js/cadastro-usuario.js"></script>

</body>

</html>
