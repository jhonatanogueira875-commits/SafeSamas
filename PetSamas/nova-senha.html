<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Senha - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <!-- ==================================================
             LOGO
        =================================================== -->

        <img
            src="assets/images/logo.jpg"
            alt="Logo PetSamas"
            id="logo">

        <!-- ==================================================
             TÍTULO
        =================================================== -->

        <h1>Nova Senha</h1>

        <p class="subtitulo">

            Digite sua nova senha para concluir a recuperação da conta.

        </p>

        <!-- ==================================================
             FORMULÁRIO
        =================================================== -->

        <form id="formNovaSenha">

            <label for="senha">

                🔒 Nova Senha

            </label>

            <input
                type="password"
                id="senha"
                placeholder="Digite a nova senha"
                autocomplete="new-password"
                required>

            <label for="confirmarSenha">

                🔒 Confirmar Senha

            </label>

            <input
                type="password"
                id="confirmarSenha"
                placeholder="Confirme a nova senha"
                autocomplete="new-password"
                required>

            <br><br>

            <button type="submit">

                💾 Salvar Nova Senha

            </button>

        </form>

        <br><br>

        <a href="login.html">

            ← Voltar para o Login

        </a>

    </main>

    <!-- ==================================================
         Biblioteca Oficial do Supabase
    =================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ==================================================
         Conexão com o Supabase
    =================================================== -->

    <script src="js/supabase.js"></script>

    <!-- ==================================================
         JavaScript
    =================================================== -->

    <script src="js/nova-senha.js"></script>

</body>

</html>
