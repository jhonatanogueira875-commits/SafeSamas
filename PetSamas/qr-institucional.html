<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>QR Institucional - PetSamas</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="icon"
          type="image/png"
          href="assets/images/favicon.png">

</head>

<body>

    <main class="container">

        <!-- ==================================================
             LOGO
        =================================================== -->

        <img
            src="assets/images/logo.jpg"
            alt="Logo PetSamas"
            id="logo">

        <!-- ==================================================
             TÍTULO
        =================================================== -->

        <h1>

            📢 QR Institucional

        </h1>

        <p class="subtitulo">

            Utilize este QR Code para divulgar o PetSamas.

        </p>

        <br>

        <!-- ==================================================
             QR CODE
        =================================================== -->

        <div id="qrcode"></div>

        <br>

        <p>

            <strong>Destino:</strong>

        </p>

        <p id="linkSite">

            https://jhonatanogueira875-commits.github.io/PetSamas/

        </p>

        <br>

        <!-- ==================================================
             BOTÕES
        =================================================== -->

        <button onclick="baixarQRCode()">

            ⬇ Baixar QR Code

        </button>

        <br><br>

        <a href="admin.html">

            <button>

                🛠 Voltar ao Painel

            </button>

        </a>

    </main>

    <!-- ==================================================
         BIBLIOTECA QR CODE
    =================================================== -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- ==================================================
         JAVASCRIPT
    =================================================== -->

    <script src="js/qr-institucional.js"></script>

</body>

</html>
