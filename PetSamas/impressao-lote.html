<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão de Lote - PetSamas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <img src="assets/images/logo.jpg" alt="Logo PetSamas" id="logo">

        <h1>🖨 Impressão de Lote</h1>

        <p class="subtitulo">
            QR Codes prontos para impressão.
        </p>

        <div id="informacoesLote">
            Carregando lote...
        </div>

        <br>

        <div id="gradeQRCodes">
        </div>

        <br><br>

        <button onclick="window.print()">
            🖨 Imprimir / Salvar em PDF
        </button>

        <br><br>

        <button onclick="history.back()">
            ⬅ Voltar
        </button>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="js/impressao-lote.js"></script>

</body>
</html>
